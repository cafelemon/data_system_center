services:
  postgres:
    image: postgres:16-alpine
    container_name: archive-system-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: archive_system
      POSTGRES_USER: archive
      POSTGRES_PASSWORD: archive_password
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archive -d archive_system"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
